# Qualcomm UFI001C 1.95GHz Configuration
BOARD_NAME="UFI001C PRO"
BOARD_MAINTAINER="yanxiaoxih"
BOARDFAMILY="qcom64"
BOOT_FDT_FILE="qcom/msm8916-thwc-ufi001c-pro.dtb"
IMAGE_PARTITION_TABLE="gpt"
CREATE_SPARSE_IMAGE="yes"
BOOTCONFIG="none"
KERNEL_TARGET="vendor,current,edge"
KERNEL_TEST_TARGET="vendor"
INSTALL_ARMBIAN_FIRMWARE="no"
EXTRAWIFI="no"

declare -g -a ABL_DTB_LIST=("msm8916-thwc-ufi001c-pro" "msm8916-thwc-ufi001c" "msm8916-thwc-ufi003-pro")

## Install BSP, proprietary firmware, and configure system for UFI001C
function post_family_tweaks__UFI001C_naming() {
    display_alert "$BOARD" "Renaming UFI001C devices and installing BSP" "info"

    # Fetch and install firmware packages and dependencies
    local DEB_FILENAME="firmware-ufi001c.deb"
    local FIRMWARE_DEB_URL="https://raw.githubusercontent.com/YANXIAOXIH/UFI001C-Armbian/refs/heads/main/modem/"
    run_host_command_logged curl -L --retry 3 "${FIRMWARE_DEB_URL}${DEB_FILENAME}" -o "${SDCARD}/tmp/${DEB_FILENAME}"
    use_clean_environment="yes" chroot_sdcard_apt_get_install "qrtr-tools rmtfs modemmanager gawk bc ncal bsdmainutils"
	use_clean_environment="yes" chroot_sdcard_apt_get_install "/tmp/${DEB_FILENAME}"
	use_clean_environment="yes" chroot_sdcard "rm -f /tmp/${DEB_FILENAME}"

    # Create relative symlinks for MSM8916 firmware required by the kernel
    mkdir -p "$SDCARD/lib/firmware/qcom/msm8916"
	pushd "$SDCARD/lib/firmware" > /dev/null
    for fw in mba.mbn modem.mdt modem.b* wcnss.mdt wcnss.b* cmnlib.mdt cmnlib.b* keymaste.mdt keymaste.b* isdbtmm.mdt isdbtmm.b* playread.mdt playread.b* widevine.mdt widevine.b* Signedrompatch_v*.bin nfc_test.bin leia_*_470.fw ice40.bin wlan; do
        if [ -e "$fw" ]; then
            ln -sf "../../$fw" "qcom/msm8916/$fw"
        fi
    done
	popd > /dev/null

    # Optimize I/O performance
    sed -i 's/defaults/defaults,noatime/' "$SDCARD/etc/fstab"
    echo "ZRAM_PERCENTAGE=80" >> "$SDCARD/etc/default/armbian-zram-config"
    echo "SWAP_ALGORITHM=zstd" >> "$SDCARD/etc/default/armbian-zram-config"

    # Install binaries, scripts, and systemd service files
    mkdir -p "$SDCARD/etc/iptables/"
    install -Dm755 "$SRC/packages/bsp/UFI001C/bin/adbd" "$SDCARD/usr/bin/adbd"
    install -Dm755 "$SRC/packages/bsp/UFI001C/bin/gc" "$SDCARD/usr/bin/gc"
    install -Dm755 "$SRC/packages/bsp/UFI001C/ufi-usb-manager.sh" "$SDCARD/usr/sbin/ufi-usb-manager.sh"
    install -Dm644 "$SRC/packages/bsp/UFI001C/adbd.service" "$SDCARD/usr/lib/systemd/system/adbd.service"
    install -Dm644 "$SRC/packages/bsp/UFI001C/ufi-usb-manager.service" "$SDCARD/usr/lib/systemd/system/ufi-usb-manager.service"
    install -Dm644 "$SRC/packages/bsp/UFI001C/rules.v4" "$SDCARD/etc/iptables/rules.v4"
	install -Dm655 "$SRC/packages/bsp/UFI001C/zz-update-abl-kernel" "$SDCARD/etc/kernel/postinst.d/zz-update-abl-kernel"
	chroot_sdcard systemctl enable ufi-usb-manager.service
    
	return 0
}